<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Buscar – App Store</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,'DM Sans',sans-serif;background:linear-gradient(160deg,#F5A623,#B8661A);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:26px}
  .card{max-width:360px}
  .ic{width:88px;height:88px;border-radius:22px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
  .ic svg{width:46px;height:46px}
  h1{font-size:30px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
  p{font-size:15px;opacity:.95;line-height:1.5;margin-bottom:18px}
  .btn{display:inline-block;background:#fff;color:#B8661A;font-weight:700;font-size:16px;padding:14px 26px;border-radius:14px;text-decoration:none;box-shadow:0 8px 22px rgba(0,0,0,.2)}
  .hint{display:none;font-size:13.5px;opacity:.92;margin-top:20px;background:rgba(0,0,0,.16);padding:13px 15px;border-radius:12px;line-height:1.5}
</style>
</head>
<body>
<div class="card">
  <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round"><circle cx="10" cy="10" r="7"/><line x1="15" y1="15" x2="21" y2="21"/></svg></div>
  <h1>Buscar</h1>
  <p id="msg">App Store wird geöffnet…</p>
  <a class="btn" id="open" href="https://apps.apple.com/app/id6770427542">Im App Store öffnen</a>
  <p class="hint" id="hint"></p>
</div>
<script>
  var HTTPS="https://apps.apple.com/app/id6770427542";
  var ITMS="itms-apps://apps.apple.com/app/id6770427542";
  var ua=navigator.userAgent||"";
  var inApp=/(TikTok|musical_ly|Instagram|FBAN|FBAV|FB_IAB|Line\/|Snapchat|Pinterest)/i.test(ua);
  var es=(navigator.language||"de").toLowerCase().indexOf("es")===0;
  var open=document.getElementById('open'), msg=document.getElementById('msg'), hint=document.getElementById('hint');
  if(es){ open.textContent="Abrir en el App Store"; }
  if(inApp){
    // In-App-Browser: nicht auto-umleiten (würde 404 zeigen) – Anleitung geben
    msg.textContent = es ? "Toca el botón para abrir el App Store." : "Tippe auf den Button, um den App Store zu öffnen.";
    open.href = ITMS;
    open.addEventListener('click', function(){ setTimeout(function(){ location.href=HTTPS; }, 600); });
    hint.style.display='block';
    hint.innerHTML = es
      ? "¿No se abre? Toca arriba a la derecha en <b>•••</b> (o Compartir) y elige <b>«Abrir en Safari»</b>."
      : "Öffnet sich nichts? Tippe oben rechts auf <b>•••</b> (oder Teilen) und wähle <b>„In Safari öffnen“</b>.";
  } else {
    // Normaler Browser: direkt weiterleiten
    open.href = HTTPS;
    location.replace(HTTPS);
  }
</script>
</body>
</html>
